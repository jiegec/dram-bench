name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Run benchmarks
        run: |
          chmod +x run.sh
          ./run.sh

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-logs
          path: "*.log"
